name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.x", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            Pipfile.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f Pipfile ]; then pip install pipenv && pipenv install --dev --system; fi

      - name: Run backend tests
        env:
          FLASK_ENV: testing
        run: |
          cd ${{ github.workspace }}/Project/Moviesio
          pytest -q || true 

      - name: Check Python syntax
        run: |
          python -m compileall ${{ github.workspace }}/Project

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate frontend files && test if present 
        run: |
         if [ -d Project/Moviesio/templates ] || [ -d Project/Moviesio/static ] ||
           [ -d Project/Moviesio/app/]; then
          pytest -q || exit 1
          else
          echo "No test folders found, passing."
          fi
        # -- 
          #test -d ${{ github.workspace }}/Project/Moviesio/templates/
          #test -f ${{ github.workspace }}/Project/app/views.py
          #test -d ${{ github.workspace }}/Project/Moviesio/static
        # -- 
          
