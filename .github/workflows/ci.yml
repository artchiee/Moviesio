name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            Pipfile.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f Pipfile ]; then pip install pipenv && pipenv install --dev --system; fi

      - name: Run backend tests
        env:
          FLASK_ENV: testing
        run: |
          cd Project/Moviesio
          pytest -q

      - name: Check Python syntax
        run: |
          python -m compileall Project

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate frontend files
        run: |
          test -d Project/Moviesio/templates/
          test -d Project/app/views.py
          test -d Project/Moviesio/static
